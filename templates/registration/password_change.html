{% extends "base.html" %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="form-card mx-auto mt-2">
  <h5 class="fw-700 mb-1">Change Password</h5>
  <p class="text-muted mb-4" style="font-size:.85rem;">Choose a strong new password.</p>
  <form method="post" novalidate>
    {% csrf_token %}
    {% for field in form %}
    <div class="mb-3">
      <label class="form-label">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors.0 }}</div>{% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary">Update Password</button>
    <a href="{% url 'tracker:dashboard' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
  </form>
</div>
{% endblock %}
