{% extends "base.html" %}

{% block title %}Delete Category{% endblock %}

{% block content %}
<div class="form-card mx-auto text-center">
  <div style="font-size:3rem;margin-bottom:1rem;">🏷️</div>
  <h5 class="fw-700 text-danger mb-1">Delete Category?</h5>
  <p class="text-muted mb-1">
    <strong>{{ object.name }}</strong>
  </p>
  <p class="text-muted mb-4" style="font-size:.82rem;">
    Transactions in this category will become uncategorised. This cannot be undone.
  </p>
  <form method="post" class="d-flex justify-content-center gap-2">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger px-4">Yes, delete</button>
    <a href="{% url 'tracker:category_list' %}" class="btn btn-outline-secondary px-4">Cancel</a>
  </form>
</div>
{% endblock %}
